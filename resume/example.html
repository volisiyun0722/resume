<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
        }
        
        .container{
            text-align: center;
            position: absolute;
            top:50%;
            left:50%;
            transform: translate(-50%,-50%); 
        }
        span{
            color:#000;
            display: block;
            width: 100%;
        }

        .text1{
            font-size: 60px;
            font-weight: 600;
            letter-spacing: 8px;
            margin-bottom: 20px;
            position: relative;
            animation: aaa 10s;
            
        }

        .text2{
            font-size:30px ;
        }
        
        @keyframes aaa{
            0%{
                margin-bottom: -80px;
                color: #000;
            }
            30%{
                letter-spacing: 25px;margin-bottom: -40px;
            }
            80%{
                letter-spacing: 8px;margin-bottom: -40px;
            }
            100%{
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="text1">Welcome</span>
        <span class="text2">hello here is my house</span>
    </div>

    
</body>
</html>
